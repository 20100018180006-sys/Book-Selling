<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukPages • Publish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🐉</span>
                <span class="heading text-3xl font-bold text-stone-900">DrukPages</span>
            </div>
            
            <div class="flex items-center gap-8 text-lg font-medium">
                <a href="index.html" class="hover:text-amber-600">Home</a>
                <a href="shop.html" class="hover:text-amber-600">Shop</a>
                <a href="resell.html" class="hover:text-amber-600">Resell</a>
                <a href="publish.html" class="text-amber-600 font-semibold">Publish</a>
                <a href="community.html" class="hover:text-amber-600">Community</a>
                <a href="about.html" class="hover:text-amber-600">About</a>
            </div>

            <div class="flex items-center gap-5">
                <button class="text-2xl hover:text-amber-600"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="text-2xl hover:text-amber-600"><i class="fa-solid fa-shopping-cart"></i></button>
                <button class="bg-stone-900 text-white px-7 py-3 rounded-2xl hover:bg-black">Account</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-16">
        <h1 class="heading text-6xl font-bold text-center mb-8">Publish Your Book</h1>
        <p class="text-center text-stone-600 mb-12">Share your story with Bhutan and the world</p>

        <!-- Upload Button -->
        <div id="upload-section" class="text-center">
            <button onclick="showPublishForm()" 
                    class="px-16 py-6 bg-gradient-to-r from-amber-500 to-orange-600 text-white text-xl font-semibold rounded-3xl hover:scale-105 transition">
                📤 Upload Manuscript
            </button>
        </div>

        <!-- Publish Form (Hidden Initially) -->
        <div id="publish-form" class="hidden bg-white rounded-3xl shadow-xl p-10 mt-10">
            <h2 class="text-3xl font-semibold mb-8 text-center">Book Information</h2>
            
            <form onsubmit="submitBook(event)">
                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Book Title</label>
                        <input type="text" id="book-title" required
                               class="w-full border border-stone-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Author Name</label>
                        <input type="text" id="author-name" required
                               class="w-full border border-stone-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                </div>

                <div class="mt-8">
                    <label class="block text-sm font-medium mb-2">Upload Book Cover</label>
                    <input type="file" id="book-cover" accept="image/*" 
                           class="w-full border border-stone-300 rounded-2xl px-5 py-4">
                </div>

                <div class="grid md:grid-cols-2 gap-8 mt-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Number of Copies (Print)</label>
                        <input type="number" id="num-copies" value="100" min="10"
                               class="w-full border border-stone-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">MRP (Nu.)</label>
                        <input type="number" id="mrp" value="650" 
                               class="w-full border border-stone-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-500">
                    </div>
                </div>

                <div class="mt-10 flex gap-4">
                    <button type="button" onclick="hidePublishForm()" 
                            class="flex-1 py-5 border border-stone-300 rounded-3xl font-medium">
                        Cancel
                    </button>
                    <button type="submit"
                            class="flex-1 py-5 bg-stone-900 text-white rounded-3xl font-semibold">
                        Submit for Review
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showPublishForm() {
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('publish-form').classList.remove('hidden');
        }

        function hidePublishForm() {
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('publish-form').classList.add('hidden');
        }

        function submitBook(e) {
            e.preventDefault();
            const title = document.getElementById('book-title').value;
            alert(`Thank you! "${title}" has been submitted for review.\n\nOur team will contact you soon.`);
            hidePublishForm();
        }
    </script>
</body>
</html>
